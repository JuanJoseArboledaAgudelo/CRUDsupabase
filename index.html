<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Completo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Agrega el script de Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!--pass: aV664V7tu91xX6jO-->


</head>
<body class="bg-light">

    <div class="container mt-5">
        <h2 class="text-center mt-5">Registro de usos</h2>

        <div class="card p-3 mb-4">

            <input type="hidden" id="userId">

            <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre">
            <input type="email" id="correo" class="form-control mb-2" placeholder="Correo electrónico">

            <button id="saveBtn" class="btn btn-primary w-100 mb-2">Guardar</button>
            <button id="deleteBtn" class="btn btn-danger w-100">Eliminar</button>
        </div>

        <div class="card p-3">
            <h4>Lista de Usuarios</h4>
        </div>

        <table class="table mt-4">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Correo Electrónico</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>
    </div>

<script>

const supabaseUrl = 'https://fovpklepwacddtmzamjd.supabase.co';
const supabaseKey = 'sb_publishable_fYJYrBwRxB24GB1lHxrs-Q_9r5N8jHF';
//sb_publishable_fYJYrBwRxB24GB1lHxrs-Q_9r5N8jHF
// Create Supabase client (support both v2 CDN which exposes createClient at window.createClient
// and older exposures at window.supabase.createClient)
const supabaseClient = (window.createClient || (window.supabase && window.supabase.createClient)).call(window, supabaseUrl, supabaseKey);

// Quick connectivity check
async function checkConnection() {
    try {
        const { data, error } = await supabaseClient.from('users').select('id').limit(1);
        if (error) throw error;
        console.log('Supabase connected. Sample rows:', data.length);
    } catch (err) {
        console.error('Supabase connection error:', err.message || err);
        alert('Error conectando a Supabase: ' + (err.message || err));
    }
}
checkConnection();

//validación de campos
function validateFields(nombre, correo) {
    if (!nombre || !correo) {
        alert('Por favor, completa todos los campos.');
        return false;
    }
    
    const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    
    if (!regexEmail.test(correo)) {
        alert('Por favor, ingresa un correo electrónico válido.');
        return false;
    }
    
    return true;
}

function clearFields() {
    document.getElementById('nombre').value = '';
    document.getElementById('correo').value = '';
    document.getElementById('userId').value = '';
}

function saveUser() {
    const nombre = document.getElementById('nombre').value;
    const correo = document.getElementById('correo').value;
    const userId = document.getElementById('userId').value;

    if (!validateFields(nombre, correo)) {
        return;
    }
    let error;

    
        // Actualizar usuario existente

    (async () => {
        try {
            if (userId) {
                const { data, error } = await supabaseClient.from('users').update({ nombre, correo }).eq('id', userId);
                if (error) throw error;
                alert('Usuario actualizado correctamente');
            } else {
                const { data, error } = await supabaseClient.from('users').insert({ nombre, correo });
                if (error) throw error;
                alert('Usuario creado correctamente');
            }
            clearFields();
            cargarUsuarios();
        } catch (err) {
            console.error('Error al guardar usuario:', err.message || err);
            alert('Error al guardar usuario: ' + (err.message || err));
        }
    })();
}

// Editar y eliminar auxiliares
function editarUsuario(id, nombre, correo) {
    document.getElementById('userId').value = id;
    document.getElementById('nombre').value = nombre;
    document.getElementById('correo').value = correo;
}

async function eliminarUsuario(id) {
    if (!confirm('¿Eliminar usuario?')) return;
    try {
        const { error } = await supabaseClient.from('users').delete().eq('id', id);
        if (error) throw error;
        alert('Usuario eliminado');
        cargarUsuarios();
    } catch (err) {
        console.error('Error al eliminar usuario:', err.message || err);
        alert('Error al eliminar usuario: ' + (err.message || err));
    }
}

// ===== CARGAR USUARIOS=====
async function cargarUsuarios() {

    try {

      const { data, error } = await supabaseClient
        .from("users")
        .select("*")
        .order("id", { ascending: true });

      if (error) {
        throw error;
      }

      const tabla = document.getElementById("userTableBody");

      let html = "";

      data.forEach(usuario => {

        html += `
          <tr>
            <td>${usuario.id}</td>
            <td>${usuario.nombre}</td>
            <td>${usuario.correo}</td>
            <td>
              <button class="btn btn-warning btn-sm me-1" onclick="editarUsuario(${usuario.id}, '${usuario.nombre}', '${usuario.correo}')">Editar</button>
              <button class="btn btn-danger btn-sm" onclick="eliminarUsuario(${usuario.id})">Eliminar</button>
            </td>
          </tr>
        `;
      });

      tabla.innerHTML = html;

    } catch (err) {

      console.error(err);
      alert("Error al cargar usuarios: " + err.message);
    }
  }
  cargarUsuarios();

</script>

</body>
</html>
